name: Deploy Backend to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "/root/workzora-be"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/workzora-be

            echo "${{ secrets.ROOT_ENV }}" > .env
            echo "${{ secrets.AUTH_ENV }}" > auth-service/.env
            echo "${{ secrets.USER_ENV }}" > user-service/.env
            echo "${{ secrets.PROJECT_ENV }}" > project-service/.env
            echo "${{ secrets.GATEWAY_ENV }}" > api-gateway/.env

            cd auth-service && npm install && cd ..
            cd user-service && npm install && cd ..
            cd project-service && npm install && cd ..
            cd api-gateway && npm install && cd ..

            docker compose down
            docker compose up -d --build